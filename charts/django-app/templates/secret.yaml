{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secret.name }}
type: Opaque
stringData:
  SECRET_KEY: {{ required "secret.data.SECRET_KEY is required" .Values.secret.data.SECRET_KEY | quote }}
  DB_USER: {{ required "secret.data.DB_USER is required" .Values.secret.data.DB_USER | quote }}
  DB_PASSWORD: {{ required "secret.data.DB_PASSWORD is required" .Values.secret.data.DB_PASSWORD | quote }}
{{- end }}